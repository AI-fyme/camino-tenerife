<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camino Tenerife — About · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3f0ea;       /* canvas background */
    --sheet:#fbfaf7;       /* the wireframe sheet */
    --ink:#2a2722;         /* pencil ink */
    --ink-soft:#6c665c;    /* lighter pencil */
    --bar:#d8d3c8;         /* text-line bars */
    --bar-strong:#c7c1b4;
    --edge:#b9b2a4;        /* dashed borders */
    /* brand nods (toggle off for pure b&w) */
    --terra:#C4622D;
    --gold:#D4A035;
    --forest:#2C4A3E;
    --sage:#7A9E7E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Patrick Hand',ui-rounded,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  /* grayscale mode */
  body.mono{ --terra:#7d7a73; --gold:#9a968d; --forest:#4a4843; --sage:#8a877f; }
  body.mono .sheet{ filter:grayscale(1); }

  /* ---------------- top toolbar ---------------- */
  .toolbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:12px 22px;
    background:rgba(248,246,242,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1.5px dashed var(--edge);
  }
  .tb-title{font-family:'Caveat',cursive;font-size:25px;font-weight:700;color:var(--ink);line-height:1;margin-right:4px;}
  .tb-title small{display:block;font-family:'Patrick Hand';font-size:12.5px;color:var(--ink-soft);letter-spacing:.04em;}
  .tabs{display:flex;gap:7px;flex-wrap:wrap;}
  .tab{
    font-family:'Patrick Hand';font-size:15px;color:var(--ink);
    background:var(--sheet);border:1.5px solid var(--edge);border-radius:9px;
    padding:7px 13px;cursor:pointer;line-height:1;white-space:nowrap;
    transition:transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .tab .k{color:var(--terra);font-weight:700;margin-right:5px;}
  .tab:hover{transform:translateY(-1px);}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab.active .k{color:var(--gold);}
  .spacer{flex:1;}
  .toggles{display:flex;gap:8px;align-items:center;}
  .toggle{
    font-family:'Patrick Hand';font-size:13.5px;color:var(--ink-soft);
    display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;
    border:1.5px solid var(--edge);background:var(--sheet);border-radius:8px;padding:6px 11px;
  }
  .toggle input{display:none;}
  .toggle .pip{width:30px;height:16px;border-radius:9px;background:var(--bar-strong);position:relative;transition:background .15s;}
  .toggle .pip::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .15s;}
  .toggle input:checked + .pip{background:var(--terra);}
  .toggle input:checked + .pip::after{transform:translateX(14px);}

  /* ---------------- canvas + sheet ---------------- */
  .canvas{
    padding:34px 24px 90px;
    min-height:calc(100vh - 60px);
    background-image:radial-gradient(var(--edge) 0.7px, transparent 0.7px);
    background-size:22px 22px;
  }
  .stage-label{
    max-width:1180px;margin:0 auto 16px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
  }
  .stage-label h2{font-family:'Caveat',cursive;font-size:30px;margin:0;font-weight:700;}
  .stage-label .key{font-family:'Caveat';font-size:30px;color:var(--terra);font-weight:700;}
  .stage-label p{font-family:'Patrick Hand';font-size:15px;color:var(--ink-soft);margin:0;max-width:560px;}
  .sheet{
    max-width:1180px;margin:0 auto;background:var(--sheet);
    border:2px solid var(--ink);border-radius:14px;overflow:hidden;
    box-shadow:7px 9px 0 rgba(42,39,34,0.10);
  }

  /* faux browser/nav chrome */
  .chrome{background:var(--forest);padding:0 26px;height:62px;display:flex;align-items:center;justify-content:space-between;}
  .chrome .logo{display:flex;align-items:center;gap:10px;color:#fff;}
  .chrome .logo .badge{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Caveat';font-size:15px;}
  .chrome .logo span{font-family:'Caveat';font-size:19px;}
  .chrome nav{display:flex;gap:20px;}
  .chrome nav a{font-family:'Patrick Hand';font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);}
  .chrome nav a.here{color:#fff;border-bottom:2px solid var(--gold);padding-bottom:3px;}
  .chrome .cta{font-family:'Patrick Hand';font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--terra);padding:8px 14px;border-radius:2px;}

  /* primitives */
  .pad{padding:46px 54px;}
  .photo{
    position:relative;background:
      linear-gradient(135deg,transparent calc(50% - 1px),var(--edge) 50%,transparent calc(50% + 1px)),
      linear-gradient(45deg,transparent calc(50% - 1px),var(--edge) 50%,transparent calc(50% + 1px)),
      repeating-linear-gradient(45deg,rgba(184,178,164,.10) 0 9px,transparent 9px 18px);
    background-color:#efece5;
    border:1.5px dashed var(--edge);border-radius:6px;
    display:flex;align-items:flex-end;justify-content:center;
    color:var(--ink-soft);min-height:120px;
  }
  .photo{align-items:center;}
  .photo .cap{background:var(--sheet);border:1.5px solid var(--edge);border-radius:6px;font-size:13px;padding:4px 10px;text-align:center;max-width:84%;}
  .photo.round{border-radius:50%;}
  .photo.round .cap{margin-bottom:0;}
  .hwrite{font-family:'Caveat',cursive;font-weight:700;line-height:1.1;color:var(--ink);margin:0;}
  .eyebrow{font-family:'Patrick Hand';font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra);display:inline-flex;align-items:center;gap:9px;margin:0 0 14px;}
  .eyebrow::before{content:'';width:26px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--terra),var(--gold));}
  .eyebrow.cen{justify-content:center;}
  /* text-line bars */
  .lines{display:flex;flex-direction:column;gap:9px;}
  .ln{height:9px;border-radius:5px;background:var(--bar);}
  .ln.s{background:var(--bar-strong);}
  .btn-wf{display:inline-block;font-family:'Patrick Hand';font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--terra);padding:11px 22px;border-radius:2px;}
  .btn-wf.out{background:transparent;color:var(--terra);border:1.5px solid var(--terra);}
  .chip{font-family:'Patrick Hand';font-size:14px;border:1.5px solid var(--edge);border-radius:999px;padding:7px 16px;background:#fff;color:var(--ink);}
  .divider{height:2px;border:0;background:linear-gradient(90deg,var(--terra),var(--gold) 60%,transparent);margin:0;}

  /* annotations (margin notes) */
  .annot{position:relative;}
  .note{
    font-family:'Caveat',cursive;font-size:18px;line-height:1.1;color:var(--terra);
    display:flex;gap:7px;align-items:flex-start;margin:10px 0;
  }
  .note::before{content:'↳';font-size:18px;}
  body.no-notes .note{display:none;}

  .grid{display:grid;gap:26px;}
  .footer-wf{background:var(--forest);height:120px;display:flex;align-items:center;justify-content:space-between;padding:0 54px;}
  .footer-wf .lns{display:flex;flex-direction:column;gap:9px;width:160px;}
  .footer-wf .ln{background:rgba(255,255,255,.28);}
  .tl-note{font-family:'Caveat';font-size:17px;color:var(--ink-soft);}
  .teaser-wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:34px;}
  .mini-label{font-family:'Caveat';font-size:24px;font-weight:700;color:var(--ink);margin:0 0 2px;}
  .mini-label .key{color:var(--terra);}
  .mini-sub{font-family:'Patrick Hand';font-size:14px;color:var(--ink-soft);margin:0 0 12px;}
  @media (max-width:760px){
    .pad{padding:30px 26px;}
    .stage-label{padding:0 4px;}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="tb-title">About Andreas<small>Camino Tenerife · layout wireframes</small></div>
    <div class="tabs" id="tabs"></div>
    <div class="spacer"></div>
    <div class="toggles">
      <label class="toggle"><input type="checkbox" id="tg-color" checked><span class="pip"></span>Colour</label>
      <label class="toggle"><input type="checkbox" id="tg-notes" checked><span class="pip"></span>Notes</label>
    </div>
  </div>

  <div class="canvas">
    <div class="stage-label" id="stageLabel"></div>
    <div id="stage"></div>
  </div>

<script>
/* ---------- tiny html helpers ---------- */
const h = (s) => s;
function lines(n, opts={}){
  const w = opts.w || [100,96,99,72];
  let out = '<div class="lines" style="'+(opts.style||'')+'">';
  for(let i=0;i<n;i++){
    const width = w[i % w.length];
    out += '<div class="ln'+(opts.strong?' s':'')+'" style="width:'+width+'%"></div>';
  }
  return out+'</div>';
}
function photo(label, style='', cls=''){
  return '<div class="photo '+cls+'" style="'+style+'"><span class="cap">'+label+'</span></div>';
}
function note(t){ return '<div class="note">'+t+'</div>'; }
function chrome(){
  return '<div class="chrome">'
    + '<div class="logo"><span class="badge">CT</span><span>Camino Tenerife</span></div>'
    + '<nav><a>The Experience</a><a>Journeys</a><a class="here">About Me</a><a>The Gear</a></nav>'
    + '<span class="cta">Walk with me</span></div>';
}
function footer(){
  return '<div class="footer-wf">'
    + '<div class="lns"><div class="ln"></div><div class="ln" style="width:60%"></div></div>'
    + '<div class="lns"><div class="ln" style="width:70%"></div><div class="ln" style="width:90%"></div></div>'
    + '<div class="lns"><div class="ln" style="width:80%"></div><div class="ln" style="width:50%"></div></div>'
    + '</div>';
}
function ctaBand(){
  return '<div class="pad" style="background:var(--forest);text-align:center;color:#fff;">'
    + '<div class="eyebrow cen" style="color:var(--gold);">Walk with me</div>'
    + '<p class="hwrite" style="font-size:40px;color:#fff;margin-bottom:18px;">A path is better shared. Come walk with me.</p>'
    + '<span class="btn-wf">Send me a message</span>'
    + '</div>';
}
function timelineRow(){
  const W=1000,H=440;
  const ms=[
    {x:150,y:100,year:'1977',desc:'Born in Hannover'},
    {x:352,y:248,year:'2023',desc:'Camino Francés, alone'},
    {x:548,y:122,year:'Nov 2024',desc:'Made Tenerife home'},
    {x:735,y:268,year:'2025',desc:'Camino again, with Jason'},
    {x:885,y:142,year:'Every Sunday',desc:'A new island trail'},
  ];
  // smooth route through the stops (catmull-rom -> bezier) — footprints follow this
  let d='M'+ms[0].x+','+ms[0].y;
  for(let i=0;i<ms.length-1;i++){
    const p0=ms[i-1]||ms[i],p1=ms[i],p2=ms[i+1],p3=ms[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
    d+=' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+p2.x+','+p2.y;
  }
  // map decoration: graticule, contour rings, compass, scale bar
  let grat='';
  for(let gx=125;gx<W;gx+=125) grat+='<line x1="'+gx+'" y1="0" x2="'+gx+'" y2="'+H+'" stroke="rgba(140,126,110,0.10)"/>';
  for(let gy=110;gy<H;gy+=110) grat+='<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="rgba(140,126,110,0.10)"/>';
  const contour=(cx,cy,c)=>{let s='';for(let r=1;r<=3;r++){s+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(36*r)+'" ry="'+(24*r)+'" fill="none" stroke="'+c+'"/>';}return s;};
  const compass='<g transform="translate(936,60)" fill="none">'
    +'<circle r="22" stroke="rgba(140,126,110,0.4)"/>'
    +'<path d="M0,-17 L5,1 L-5,1 Z" fill="#C4622D"/>'
    +'<path d="M0,17 L5,-1 L-5,-1 Z" fill="rgba(140,126,110,0.55)"/>'
    +'<text x="0" y="-27" text-anchor="middle" font-family="Patrick Hand" font-size="13" fill="#6c665c">N</text></g>';
  const scalebar='<g transform="translate(60,404)" stroke="#8C7E6E">'
    +'<line x1="0" y1="0" x2="96" y2="0"/><line x1="0" y1="-4" x2="0" y2="4"/><line x1="48" y1="-4" x2="48" y2="4"/><line x1="96" y1="-4" x2="96" y2="4"/>'
    +'<text x="0" y="18" stroke="none" font-family="Patrick Hand" font-size="12" fill="#8C7E6E">the journey</text></g>';
  const svg='<svg viewBox="0 0 '+W+' '+H+'" data-trailmap preserveAspectRatio="none" style="width:100%;height:auto;display:block;overflow:visible;">'
    +grat+contour(185,330,'rgba(122,158,126,0.20)')+contour(815,150,'rgba(46,125,140,0.16)')
    +compass+scalebar
    +'<path class="route" d="'+d+'" fill="none" stroke="none"/></svg>';
  // photo-pins dropped on each stop
  const pins=ms.map(m=>{
    const L=(m.x/W*100),T=(m.y/H*100);
    return '<div style="position:absolute;left:'+L+'%;top:'+T+'%;transform:translateX(-50%);width:150px;text-align:center;">'
      +'<div class="photo round" style="width:58px;height:58px;min-height:0;margin:-29px auto 0;border-color:var(--terra);box-shadow:0 0 0 3px var(--sheet),0 0 0 4px var(--terra);"></div>'
      +'<div class="hwrite" style="font-size:20px;white-space:nowrap;margin-top:7px;">'+m.year+'</div>'
      +'<div style="font-size:12.5px;color:var(--ink-soft);line-height:1.25;">'+m.desc+'</div>'
    +'</div>';
  }).join('');
  return '<div style="position:relative;">'+svg+pins+'</div>';
}

function initTrailMaps(){
  document.querySelectorAll('svg[data-trailmap]').forEach(svg=>{
    const route=svg.querySelector('.route'); if(!route) return;
    let len=0; try{ len=route.getTotalLength(); }catch(e){ return; }
    if(!len) return;
    const ns='http://www.w3.org/2000/svg';
    const grp=document.createElementNS(ns,'g');
    let i=0;
    for(let dd=14; dd<len-8; dd+=27){
      const p=route.getPointAtLength(dd), p2=route.getPointAtLength(Math.min(dd+1,len));
      const dx=p2.x-p.x, dy=p2.y-p.y, mlen=Math.hypot(dx,dy)||1;
      const ang=Math.atan2(dy,dx)*180/Math.PI;
      const side=(i%2?1:-1)*4.5, ox=-dy/mlen*side, oy=dx/mlen*side;
      const g=document.createElementNS(ns,'g');
      g.setAttribute('transform','translate('+(p.x+ox)+','+(p.y+oy)+') rotate('+(ang+90)+')');
      g.setAttribute('opacity','0.5');
      const sole=document.createElementNS(ns,'ellipse');
      sole.setAttribute('cx',0);sole.setAttribute('cy',-1.6);sole.setAttribute('rx',3.4);sole.setAttribute('ry',5.6);sole.setAttribute('fill','#C4622D');
      const heel=document.createElementNS(ns,'ellipse');
      heel.setAttribute('cx',0);heel.setAttribute('cy',5.8);heel.setAttribute('rx',2.2);heel.setAttribute('ry',2.8);heel.setAttribute('fill','#C4622D');
      g.appendChild(sole);g.appendChild(heel);grp.appendChild(g);
      i++;
    }
    svg.appendChild(grp);
  });
}

/* ---------- the five directions ---------- */
const DIRECTIONS = {
  A: {
    name:'The Trail Journal',
    key:'A',
    blurb:'A single warm column you scroll like a guidebook — full-bleed portrait, then the story unfolds in alternating photo / text rows with a milestone strip.',
    render(){
      return ''
      + chrome()
      // hero overlay
      + '<div style="position:relative;height:480px;background:#e7e2d8;display:flex;align-items:flex-end;">'
        + '<div class="photo" style="position:absolute;inset:0;border-radius:0;border:0;align-items:flex-start;justify-content:flex-end;"><span class="cap" style="margin:14px;">Full-bleed: Andreas on a Tenerife ridge at sunrise</span></div>'
        + '<div style="position:relative;padding:46px 54px;color:#fff;background:linear-gradient(to top,rgba(26,18,8,.72),rgba(26,18,8,.1) 70%,transparent);width:100%;">'
          + '<div class="eyebrow" style="color:var(--gold);">The guide</div>'
          + '<p class="hwrite" style="font-size:48px;max-width:760px;color:#fff;">I\'m Andreas. I walk — and I\'d love you to walk with me.</p>'
        + '</div>'
      + '</div>'
      // intro
      + '<div class="pad annot">'
        + '<div style="max-width:680px;">'+ lines(4,{w:[100,97,93,55]}) +'</div>'
        + note('Lead paragraph in my voice. ~3 sentences: Hannover boy, fell for walking, then for this island.')
      + '</div>'
      + '<hr class="divider" style="margin:0 54px;">'
      // split row 1
      + '<div class="pad grid annot" style="grid-template-columns:5fr 6fr;align-items:center;">'
        + photo('Portrait — Andreas, candid','aspect-ratio:4/3;')
        + '<div><div class="eyebrow">How I got here</div>'+ lines(5,{w:[100,92,98,80,60]}) +'</div>'
        + note('Alternating rows keep one idea per screen — very journal-like.')
      + '</div>'
      // timeline strip
      + '<div class="pad annot" style="background:var(--sheet);border-top:1.5px dashed var(--edge);border-bottom:1.5px dashed var(--edge);">'
        + '<div class="eyebrow cen" style="justify-content:center;margin-bottom:30px;">The path so far</div>'
        + timelineRow()
        + note('A trail map, not a chart: each stop is a photo-pin, linked by footprints in the sand that walk from one highlight to the next. 2025 (with Jason) is a stop on the way.')
      + '</div>'
      // split row 2 (caminos) reversed
      + '<div class="pad grid annot" style="grid-template-columns:6fr 5fr;align-items:center;">'
        + '<div><div class="eyebrow">The two-generation walk</div><p class="hwrite" style="font-size:30px;margin-bottom:14px;">2023 alone. 2025 with my son Jason.</p>'+ lines(4,{w:[100,95,88,50]}) +'</div>'
        + photo('Two photos: solo 2023 / father & son 2025','aspect-ratio:4/3;')
        + note('The emotional anchor of the page lives mid-scroll.')
      + '</div>'
      // quote
      + '<div class="pad" style="background:var(--forest);color:#fff;text-align:center;">'
        + '<p class="hwrite" style="font-size:34px;color:#fff;max-width:820px;margin:0 auto;font-style:italic;">"People who love to walk love nature, and love connecting. I want to share these places with them."</p>'
      + '</div>'
      // languages
      + '<div class="pad annot" style="text-align:center;">'
        + '<div class="eyebrow cen" style="justify-content:center;">We can talk as we walk</div>'
        + '<div style="display:flex;gap:14px;justify-content:center;margin-top:8px;"><span class="chip">Deutsch</span><span class="chip">Nederlands</span><span class="chip">English</span></div>'
        + note('Languages as a quiet trust signal, not a headline.')
      + '</div>'
      + ctaBand() + footer();
    }
  },

  B: {
    name:'Two Generations',
    key:'B',
    blurb:'Centred and editorial. A round portrait opens it, then a large side-by-side diptych — solo 2023 / father & son 2025 — is the hero moment of the whole page.',
    render(){
      return ''
      + chrome()
      + '<div class="pad" style="text-align:center;padding-top:60px;">'
        + photo('Portrait — Andreas','width:150px;height:150px;margin:0 auto 22px;','round')
        + '<div class="eyebrow cen" style="justify-content:center;">Your guide on the island</div>'
        + '<p class="hwrite" style="font-size:50px;max-width:760px;margin:6px auto 18px;">A hiker from Hannover who made Tenerife home.</p>'
        + '<div style="max-width:600px;margin:0 auto;">'+ lines(3,{w:[100,94,70]}) +'</div>'
      + '</div>'
      // diptych centrepiece
      + '<div class="pad annot" style="background:var(--sheet);border-top:1.5px dashed var(--edge);border-bottom:1.5px dashed var(--edge);">'
        + '<div class="eyebrow cen" style="justify-content:center;margin-bottom:26px;">The two-generation walk</div>'
        + '<div class="grid" style="grid-template-columns:1fr 1fr;gap:30px;">'
          + '<div>'+ photo('2023 — the Camino Francés, alone','aspect-ratio:3/4;') +'<p class="hwrite" style="font-size:24px;text-align:center;margin-top:12px;">2023 · I walked it alone</p></div>'
          + '<div>'+ photo('2025 — the Camino with Jason','aspect-ratio:3/4;') +'<p class="hwrite" style="font-size:24px;text-align:center;margin-top:12px;">2025 · Father &amp; son</p></div>'
        + '</div>'
        + note('Diptych = the heart of the page. Two photos do the storytelling; copy stays short underneath.')
      + '</div>'
      // compact timeline
      + '<div class="pad">'+ timelineRow() +'</div>'
      // big quote
      + '<div class="pad" style="text-align:center;background:var(--forest);color:#fff;">'
        + '<p class="hwrite" style="font-size:38px;color:#fff;max-width:860px;margin:0 auto;font-style:italic;">"I want to share the beautiful places Tenerife has to offer, with people who love to connect."</p>'
      + '</div>'
      // languages + sunday note
      + '<div class="pad grid annot" style="grid-template-columns:1fr 1fr;gap:40px;align-items:center;">'
        + '<div><div class="eyebrow">Every Sunday</div>'+ lines(3,{w:[100,90,64]}) +'</div>'
        + '<div style="text-align:center;"><div class="eyebrow cen" style="justify-content:center;">Three languages</div><div style="display:flex;gap:12px;justify-content:center;margin-top:6px;"><span class="chip">DE</span><span class="chip">NL</span><span class="chip">EN</span></div></div>'
        + note('Sunday-walks habit shows I actually live this, weekly.')
      + '</div>'
      + ctaBand() + footer();

/* ---------- shell wiring ---------- */
const ORDER = ['A','B','C','D','E','T'];
const tabsEl = document.getElementById('tabs');
const stageEl = document.getElementById('stage');
const labelEl = document.getElementById('stageLabel');
let current = localStorage.getItem('ct-about-wf') || 'A';
if(!ORDER.includes(current)) current = 'A';

ORDER.forEach(k=>{
  const d = DIRECTIONS[k];
  const b = document.createElement('button');
  b.className = 'tab';
  b.dataset.k = k;
  b.innerHTML = (k==='T' ? '<span class="k">★</span>' : '<span class="k">'+k+'</span>') + d.name;
  b.onclick = ()=>select(k);
  tabsEl.appendChild(b);
});

function select(k){
  current = k;
  localStorage.setItem('ct-about-wf', k);
  [...tabsEl.children].forEach(c=>c.classList.toggle('active', c.dataset.k===k));
  const d = DIRECTIONS[k];
  labelEl.innerHTML = '<h2><span class="key">'+(k==='T'?'★':k)+'</span> '+d.name+'</h2><p>'+d.blurb+'</p>';
  stageEl.innerHTML = (k==='T') ? d.render() : '<div class="sheet">'+d.render()+'</div>';
  initTrailMaps();
  window.scrollTo({top:0,behavior:'instant'});
}

document.getElementById('tg-color').addEventListener('change', e=>{
  document.body.classList.toggle('mono', !e.target.checked);
});
document.getElementById('tg-notes').addEventListener('change', e=>{
  document.body.classList.toggle('no-notes', !e.target.checked);
});

select(current);
</script>
